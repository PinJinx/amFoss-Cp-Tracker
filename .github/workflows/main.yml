name: Update Leaderboard

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  update-leaderboard:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Block PRs targeting main
        if: github.event.pull_request.base.ref == 'main'
        run: |
          echo "❌  This PR targets 'main'. Submissions must target a date branch (YYYY-MM-DD)."
          exit 1

      # # ── 0b. Validate the target branch is YYYY-MM-DD ──────────────────────
      # - name: Validate date branch format
      #   id: validate
      #   run: |
      #     BRANCH="${{ github.event.pull_request.base.ref }}"
      #     if [[ ! "$BRANCH" =~ "main"]]; then
      #       echo "Target branch '$BRANCH' is the Main Branch."
      #       exit 1
      #     fi
      #     echo "Target branch: $BRANCH"
      #     echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}  # check out the PR branch, not base

      # ── 2. Node setup ─────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── 3. Install deps ───────────────────────────────────────────────────
      - name: Install dependencies
        run: npm install @supabase/supabase-js

      # ── 4. Get added files ────────────────────────────────────────────────
      - name: Get changed files
        id: changed
        run: |
          BRANCH="${{ github.event.pull_request.base.ref }}"

          git fetch origin "$BRANCH"

          FILES=$(git diff --name-only --diff-filter=A \
            origin/"$BRANCH"...HEAD)
          echo "Added files in this PR:"
          echo "$FILES"

          {
            echo "FILES<<EOF"
            echo "$FILES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # ── 5. Run update.js ──────────────────────────────────────────────────
      - name: Update Supabase leaderboard
        id: update
        env:
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:        ${{ secrets.SUPABASE_KEY }}
          GITHUB_TOKEN:        ${{ secrets.PAT_TOKEN }}
          PR_AUTHOR:           ${{ github.event.pull_request.user.login }}
          CHANGED_FILES:       ${{ steps.changed.outputs.FILES }}
          DATE_BRANCH:         ${{ github.event.pull_request.base.ref }}
          POINTS_PER_QUESTION: "10"
        run: node LeaderBoard/src/update.js

      # ── 6. Comment on PR ──────────────────────────────────────────────────
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            const author = context.payload.pull_request.user.login;
            const branch = context.payload.pull_request.base.ref;

            const raw    = `${{ steps.changed.outputs.FILES }}`;
            const prefix = `Members/${author.toLowerCase()}/`;
            const files  = raw.split('\n')
              .map(f => f.trim())
              .filter(f => f.startsWith(prefix) && !f.endsWith('/') && f !== prefix);
            const count = files.length;
            const body = [
              `## ✅ Leaderboard Updated!`,
              ``,
              `| | |`,
              `|---|---|`,
              `| 👤 **User** | \`${author}\` |`,
              `| 📝 **Questions submitted** | ${count} |`,
              `| 📅 **Submitted to** | \`${branch}\` |`,
              ``,
              `_Merging this PR into \`${branch}\` now…_`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });

      # ── 7. Auto-merge into the date branch ───────────────────────────────
      - name: Merge PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            const pr     = context.payload.pull_request;
            const author = pr.user.login;
            const branch = pr.base.ref;

            await github.rest.pulls.merge({
              owner:          context.repo.owner,
              repo:           context.repo.repo,
              pull_number:    pr.number,
              commit_title:   `chore: add ${author}'s questions [${branch}]`,
              commit_message: `Auto-merged by leaderboard workflow after updating Supabase.`,
              merge_method:   "squash",
            });

            console.log(`✅  PR #${pr.number} merged into ${branch}`);